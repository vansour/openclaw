services:
  openclaw:
    image: ghcr.io/vansour/openclaw:${OPENCLAW_VERSION}-${OPENCLAW_IMAGE_REVISION}
    container_name: openclaw
    restart: unless-stopped
    user: "0:0"
    ports:
      - "18789:18789"
    command:
      - sh
      - -lc
      - |
        mkdir -p /home/node/.openclaw /home/node/.openclaw/workspace /home/node/.cache /home/node/.config
        chown node:node /home/node/.openclaw /home/node/.openclaw/workspace /home/node/.cache /home/node/.config
        if [ ! -f /home/node/.openclaw/openclaw.json ]; then
          cp /app/examples/openclaw.example.json5 /home/node/.openclaw/openclaw.json
          chown node:node /home/node/.openclaw/openclaw.json
          chmod 600 /home/node/.openclaw/openclaw.json
        fi
        setpriv --reuid 1000 --regid 1000 --init-groups \
          node openclaw.mjs config set gateway.controlUi.enabled false >/dev/null
        exec setpriv --reuid 1000 --regid 1000 --init-groups \
          node openclaw.mjs gateway --allow-unconfigured --bind lan
    environment:
      NODE_ENV: production
      HOME: /home/node
      USER: node
      LOGNAME: node
      XDG_CONFIG_HOME: /home/node/.config
      XDG_CACHE_HOME: /home/node/.cache
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      VANSOUR_OPENAI_API_KEY: ${VANSOUR_OPENAI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
    volumes:
      - ./data/config:/home/node/.openclaw
      - ./data/workspace:/home/node/.openclaw/workspace
