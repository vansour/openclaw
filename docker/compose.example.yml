services:
  openclaw:
    image: ghcr.io/vansour/openclaw:${OPENCLAW_VERSION}-${OPENCLAW_IMAGE_REVISION}
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    command:
      - sh
      - -lc
      - |
        if [ ! -f /home/node/.openclaw/openclaw.json ]; then
          cp /bootstrap/openclaw.example.json5 /home/node/.openclaw/openclaw.json
        fi
        node openclaw.mjs config set gateway.controlUi.enabled false >/dev/null
        exec node openclaw.mjs gateway --allow-unconfigured --bind lan
    environment:
      NODE_ENV: production
      VANSOUR_OPENAI_API_KEY: ${VANSOUR_OPENAI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
    volumes:
      - openclaw-config:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
      - ./openclaw.example.json5:/bootstrap/openclaw.example.json5:ro

volumes:
  openclaw-config:
  openclaw-workspace:
